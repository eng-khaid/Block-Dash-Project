<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Block Dash Pro Racing - Classic Edition</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif}

body{
overflow:hidden;
background:#cfe9ff;
}

canvas{
position:fixed;
inset:0;
width:100%;
height:100%;
image-rendering:pixelated;
}

#ui{
position:fixed;
top:10px;
left:10px;
display:flex;
gap:10px;
z-index:10;
}

.panel{
background:#222;
color:#fff;
padding:8px 12px;
border-radius:6px;
font-size:14px;
font-weight:bold;
}

#menu{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:20;
background:rgba(207, 233, 255, 0.6);
backdrop-filter:blur(4px);
}

h1 {
color:#222;
font-size:3.5rem;
letter-spacing:2px;
margin-bottom:20px;
}

button{
padding:12px 24px;
background:#4caf50;
color:#fff;
border:none;
cursor:pointer;
border-radius:8px;
font-size:16px;
font-weight:bold;
box-shadow:0 4px 10px rgba(76, 175, 80, 0.3);
transition:all 0.2s ease;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 6px 14px rgba(76, 175, 80, 0.5);
}

/* شاشة الفوز الاحترافية المدمجة المتناسقة مع الألوان الفاتحة */
#victoryScreen {
position:fixed;
inset:0;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:25;
background:rgba(255, 255, 255, 0.9);
backdrop-filter:blur(8px);
animation:fadeIn 0.4s ease forwards;
}

@keyframes fadeIn {
from { opacity:0; } to { opacity:1; }
}

.victory-title {
color:#4caf50;
font-size:4.5rem;
font-weight:900;
letter-spacing:4px;
margin-bottom:10px;
text-shadow:0 4px 10px rgba(76, 175, 80, 0.2);
}

.victory-sub {
color:#555;
font-size:1.2rem;
margin-bottom:24px;
text-transform:uppercase;
letter-spacing:2px;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="ui">
<div class="panel">Score: <span id="score">0</span></div>
<div class="panel">Best: <span id="best">0</span></div>
</div>

<div id="menu">
<h1>BLOCK DASH</h1>
<button onclick="start()">START</button>
</div>

<!-- شاشة الفوز الجديدة المتناسقة بدون Alert وبدون إيموجي -->
<div id="victoryScreen">
<div class="victory-title">VICTORY</div>
<div class="victory-sub">Level Protocol Successfully Completed</div>
<button onclick="closeVictoryAndMenu()">CONTINUE</button>
</div>

<script>
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

let W,H;
function resize(){
W=canvas.width=innerWidth;
H=canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

const groundOffset=90;

let player={
x:120,
y:0,
vy:0,
r:14,
jump:-12,
gravity:0.7
};

let running=false;
let obstacles=[];
let score=0;
let best=localStorage.getItem("best")||0;
let frame=0;
let speed=3.5;

let spawnCount=0;
let finishLine=null;
let gameWon=false;

let fireworks=[];
let screenShake=0;

document.getElementById("best").textContent=best;

function start(){
running=true;
document.getElementById("menu").style.display="none";
document.getElementById("victoryScreen").style.display="none";

score=0;
obstacles=[];
frame=0;
spawnCount=0;
finishLine=null;
gameWon=false;
fireworks=[];
screenShake=0;

player.y=H-groundOffset;
player.vy=0;

loop();
}

function spawn(){
spawnCount++;

obstacles.push({
x:W+50,
h:Math.random()*90+60,
gap:260,
w:55,
passed:false
});

// تعديل: خط النهاية يظهر الآن بعد العمود العاشر مباشرة لتحدي أطول وأجمل
if(spawnCount === 10){
finishLine = {
x: W + 400,
w: 24 
};
}
}

/* نظام الاحتفال المتقدم الملون */
function addAdvancedFireworkSystem(x, y) {
const particleCount = 45;
for (let i = 0; i < particleCount; i++) {
const angle = (Math.PI * 2 / particleCount) * i + (Math.random() - 0.5) * 0.5;
const velocityMagnitude = Math.random() * 6 + 3;

fireworks.push({
x: x,
y: y,
vx: Math.cos(angle) * velocityMagnitude,
vy: Math.sin(angle) * velocityMagnitude,
gravity: 0.05,
alpha: 1,
decay: Math.random() * 0.015 + 0.01,
color: `hsl(${Math.random() * 360}, 100%, 60%)`,
size: Math.random() * 3 + 1.5
});
}
}

function win(){
gameWon=true;
screenShake = 12;

for(let i=0; i<5; i++){
setTimeout(() => {
addAdvancedFireworkSystem(player.x + (Math.random()*200 - 100), player.y + (Math.random()*150 - 75));
screenShake = 10;
}, i * 130);
}

setTimeout(() => {
running = false;
document.getElementById("victoryScreen").style.display = "flex";
}, 1200);
}

function closeVictoryAndMenu() {
document.getElementById("victoryScreen").style.display = "none";
document.getElementById("menu").style.display = "flex";
if(score > best){
best = score;
localStorage.setItem("best", best);
}
document.getElementById("best").textContent = best;
}

function update(){
frame++;
if(running && frame%110===0 && !finishLine) spawn();

if(running) speed += 0.001;

let groundY=H-groundOffset;

player.vy += player.gravity;
player.y += player.vy;

if(player.y>groundY){
player.y=groundY;
player.vy=0;
}

for(let i=obstacles.length-1;i>=0;i--){
let o=obstacles[i];
o.x -= speed;

if(o.x<-120) obstacles.splice(i,1);

if(
player.x+player.r>o.x &&
player.x-player.r<o.x+o.w &&
(player.y-player.r<o.h || player.y+player.r>o.h+o.gap)
){
reset();
}

if(!o.passed && o.x<player.x){
score++;
o.passed=true;
}
}

if(finishLine){
finishLine.x -= speed;

if(!gameWon && player.x + player.r > finishLine.x){
win();
}
}

for(let i=fireworks.length-1;i>=0;i--){
let p=fireworks[i];
p.x += p.vx;
p.y += p.vy;
p.vy += p.gravity;
p.alpha -= p.decay;
if(p.alpha<=0) fireworks.splice(i,1);
}

if(screenShake > 0) screenShake *= 0.88;

document.getElementById("score").textContent=score;
}

function draw(){
ctx.save();
if(screenShake > 0.5) {
let dx = (Math.random() - 0.5) * screenShake;
let dy = (Math.random() - 0.5) * screenShake;
ctx.translate(dx, dy);
}

ctx.clearRect(0,0,W,H);

// الألوان الكلاسيكية المأخوذة من كودك بالظبط
ctx.fillStyle = "#cfe9ff"; // لون السماء الفاتح
ctx.fillRect(0,0,W,H);

let groundY=H-groundOffset;

// الأرضية العشبية التناوبية من كودك
for(let x=0;x<W;x+=40){
ctx.fillStyle=(x/40%2)?"#5c8f3a":"#4e7c31";
ctx.fillRect(x,groundY+20,40,40);
}

// Player
ctx.fillStyle="#3aa655";
ctx.beginPath();
ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
ctx.fill();

// Obstacles
for(let o of obstacles){
ctx.fillStyle="#b33a3a";
ctx.fillRect(o.x,0,o.w,o.h);
ctx.fillRect(o.x,o.h+o.gap,o.w,H);
}

/* ================= خط النهاية المربعات الممتد الكامل من الأعلى للأسفل ================= */
if(finishLine){
let boxSize = 8; // حجم المربعات

// ممتد بالكامل من الرأس وحتى بداية الأرضية العشبية
for(let y = 0; y < groundY + 20; y += boxSize){
for(let x = 0; x < finishLine.w; x += boxSize){
ctx.fillStyle = (Math.floor(x / boxSize) + Math.floor(y / boxSize)) % 2 === 0 ? "#ffffff" : "#000000";
ctx.fillRect(finishLine.x + x, y, boxSize, boxSize);
}
}
}

// الألعاب النارية والاحتفالات الملونة
for(let p of fireworks){
ctx.save();
ctx.globalAlpha = p.alpha;
ctx.fillStyle = p.color;
ctx.beginPath();
ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
ctx.fill();
ctx.restore();
}

ctx.restore();
}

function loop(){
update();
draw();
if(running || gameWon) {
requestAnimationFrame(loop);
}
}

function reset(){
running=false;
document.getElementById("menu").style.display="flex";

if(score>best){
best=score;
localStorage.setItem("best",best);
}
document.getElementById("best").textContent=best;
}

function jump(){
if(!running || gameWon) return;
player.vy = player.jump;
}

addEventListener("keydown",e=>{
if(e.code==="Space") jump();
});

addEventListener("touchstart",jump);
</script>

</body>
</html>
